<?xml version="1.0" encoding="UTF-8"?>
<svg width="340" height="80" viewBox="0 0 340 80" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="circleGrad" x1="0" y1="0" x2="0" y2="80">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="100%" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Circle emblem with stylized B -->
  <circle cx="40" cy="40" r="34" fill="url(#circleGrad)"/>
  <text x="40" y="52" text-anchor="middle"
        font-family="Inter, Arial, sans-serif"
        font-size="40" font-weight="900"
        fill="white">B</text>

  <!-- Wordmark -->
  <text x="95" y="55" font-family="Inter, Arial, sans-serif"
        font-size="44" font-weight="800"
        fill="url(#textGrad)" letter-spacing="1">
    Bazario
  </text>
</svg>
