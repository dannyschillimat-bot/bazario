{% extends "base.html" %}
{% block content %}
<h1>Chat mit {{ other_user.name }}</h1>
<section class="card pad messages">
  {% for message in messages %}
    <div class="message {{ 'own' if message.sender_id == current_user.id|int else '' }}">
      <strong>{{ message.sender_name }}</strong>
      <p>{{ message.body }}</p>
    </div>
  {% else %}
    <p>Noch keine Nachrichten.</p>
  {% endfor %}
</section>
<form class="card pad send-form" method="post" action="{{ url_for('send_message', thread_id=thread.id) }}">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <label>Nachricht <textarea name="text" rows="4" required></textarea></label>
  <button class="btn-primary" type="submit">Senden</button>
</form>
{% endblock %}
