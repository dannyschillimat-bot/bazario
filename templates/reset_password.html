{% extends "base.html" %}
{% block content %}
<h1>Passwort zuruecksetzen</h1>
<form class="card pad form" method="post">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <label>Neues Passwort <input type="password" name="password" required minlength="10" autocomplete="new-password"></label>
  <button class="btn-primary" type="submit">Passwort speichern</button>
</form>
{% endblock %}
