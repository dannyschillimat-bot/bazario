{% extends "base.html" %}
{% block content %}
<h1>Neue Anzeige</h1>
{% if not current_user.email_verified %}
  <div class="card pad warn">Bitte bestaetige erst deine E-Mail-Adresse, bevor du Anzeigen aufgibst.</div>
{% endif %}
<form class="card pad form" action="{{ url_for('new_ad') }}" method="post" enctype="multipart/form-data">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <label>Titel <input name="title" required minlength="3" maxlength="120"></label>
  <label>Kategorie
    <select name="category" required>
      {% for c in categories %}<option value="{{ c.name }}">{{ c.name }}</option>{% endfor %}
    </select>
  </label>
  <label>Preis (EUR) <input name="price" type="number" min="0" step="0.01" required></label>
  <label>PLZ <input name="plz" pattern="\d{5}" required></label>
  <label>Ort <input name="city" required maxlength="80"></label>
  <label>Beschreibung <textarea name="description" rows="7" required minlength="10"></textarea></label>
  <label>Bilder (max. 5) <input type="file" name="images" accept="image/png,image/jpeg,image/webp,image/gif" multiple></label>
  <button class="btn-primary" type="submit">Veroeffentlichen</button>
</form>
{% endblock %}
