{% extends "base.html" %}
{% block content %}
<h1>Nachrichten</h1>
{% if threads %}
  <div class="list">
    {% for thread in threads %}
      <a class="card pad thread-card" href="{{ url_for('thread', thread_id=thread.id) }}">
        <strong>{{ thread.other_name }}</strong>
        <span>{{ thread.ad_title }}</span>
        <small>{{ thread.last_text or "Noch keine Nachricht" }}</small>
      </a>
    {% endfor %}
  </div>
{% else %}
  <div class="card pad">Noch keine Unterhaltungen.</div>
{% endif %}
{% endblock %}
