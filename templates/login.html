{% extends "base.html" %}
{% block content %}
<h1>Login</h1>
<form class="card pad form" method="post">
  <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
  <label>E-Mail <input type="email" name="email" required autocomplete="email"></label>
  <label>Passwort <input type="password" name="password" required autocomplete="current-password"></label>
  <button class="btn-primary" type="submit">Einloggen</button>
  <p>Noch kein Konto? <a href="{{ url_for('register') }}">Registrieren</a></p>
  <p><a href="{{ url_for('forgot_password') }}">Passwort vergessen?</a></p>
</form>
{% endblock %}
